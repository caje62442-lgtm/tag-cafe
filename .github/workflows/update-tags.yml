name: Update tags.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: update-tags
  cancel-in-progress: false

jobs:
  build-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_ingest.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ingest.txt

      - name: Run ingestion
        env:
          OUT_FILE: "tags.json"
          SCRAPE_SLEEP: "0.75"
          REQUEST_TIMEOUT: "30"

          # Leave off unless you really want Discord invite validation.
          VALIDATE_INVITES: "0"
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

          # Safety guards
          MIN_TOTAL_RECORDS_TO_WRITE: "1000"
          MIN_NEW_RECORDS_TO_WRITE: "1"

          # Keep multiple servers for the same tag
          KEEP_DUPLICATE_TAGS: "1"
        run: |
          python ingest_discordband.py

      - name: Commit tags.json if changed
        run: |
          git config user.name "tag-cafe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tags.json
          git add tags.bak.json || true
          git diff --cached --quiet || git commit -m "Update tags.json"
          git push
