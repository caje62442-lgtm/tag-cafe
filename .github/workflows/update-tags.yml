name: Update tags.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"  # daily at 09:00 UTC

permissions:
  contents: write

jobs:
  build-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements_ingest.txt

      - name: Run ingestion
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "tag-cafe-bot"
          REDDIT_POST_LIMIT: "200"
          SCRAPE_SLEEP: "0.3"
        run: |
          python ingest_reddit.py

      - name: Commit tags.json if changed
        run: |
          git config user.name "tag-cafe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tags.json
          git diff --cached --quiet || git commit -m "Update tags.json"
          git push
