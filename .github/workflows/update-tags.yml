name: Update tags.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: update-tags
  cancel-in-progress: false

jobs:
  build-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_ingest.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ingest.txt

      - name: Run ingestion
        env:
          OUT_FILE: "tags.json"

          # Slow and careful is fine for ingest.
          SCRAPE_SLEEP: "0.75"
          REQUEST_TIMEOUT: "30"

          # Optional Discord-side invite validation.
          # Leave off unless you want the extra validation pass.
          VALIDATE_INVITES: "0"
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

          # You want a full fresh snapshot each run, not merge-only behavior.
          REPLACE_FULL_SNAPSHOT: "1"

          # Keep multiple servers per same tag.
          KEEP_DUPLICATE_TAGS: "1"

          # Conservative write guards.
          # These should protect against catastrophic under-scrapes,
          # but should not require large "new record" counts.
          MIN_TOTAL_RECORDS_TO_WRITE: "1000"
          MIN_NEW_RECORDS_TO_WRITE: "0"

          # Discovery limits
          MAX_DISCOVERED_SECTIONS: "100"
          MAX_PAGES_PER_SECTION_HARD_LIMIT: "1000"
        run: |
          python ingest_discordband.py

      - name: Commit changed files
        run: |
          git config user.name "tag-cafe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tags.json
          git add tags.bak.json || true
          git diff --cached --quiet || git commit -m "Update tags.json"
          git push
